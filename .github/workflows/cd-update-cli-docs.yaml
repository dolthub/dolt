name: Update CLI Docs

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer release tag, e.g. 2.0.4 (with or without leading v)'
        required: true

jobs:
  update-cli-docs:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-22.04
    steps:
      - name: Resolve version and ref
        id: vars
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            tag="$RELEASE_TAG"
          else
            tag="$INPUT_VERSION"
            [[ "$tag" == v* ]] || tag="v$tag"
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "branch=auto-update-cli-docs-v$version" >> "$GITHUB_OUTPUT"

      - name: Checkout dolt at release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.vars.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          check-latest: true

      - name: Build dolt
        working-directory: go
        run: go build -o /tmp/dolt ./cmd/dolt

      - name: Generate cli.md
        run: |
          rm -f /tmp/cli.md
          /tmp/dolt dump-docs --file /tmp/cli.md
          wc -l /tmp/cli.md
          head -5 /tmp/cli.md

      - name: Checkout docs-2
        uses: actions/checkout@v6
        with:
          repository: dolthub/docs-2
          ref: dev
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          path: _docs-2

      - name: Open PR with regenerated cli.md
        working-directory: _docs-2
        env:
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
          VERSION: ${{ steps.vars.outputs.version }}
          BRANCH: ${{ steps.vars.outputs.branch }}
          ACTOR: ${{ github.actor }}
        run: |
          cp /tmp/cli.md site/dolt/src/content/reference/cli/cli.md
          if git diff --quiet -- site/dolt/src/content/reference/cli/cli.md; then
            echo "cli.md unchanged for v$VERSION; nothing to do"
            exit 0
          fi
          git config user.name "$ACTOR"
          git config user.email "$ACTOR@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add site/dolt/src/content/reference/cli/cli.md
          git commit -m "[auto-update-cli-docs] Regenerate cli.md for Dolt v$VERSION"
          git push --force-with-lease origin "$BRANCH"
          gh pr create --base dev --head "$BRANCH" \
            --title "Regenerate cli.md for Dolt v$VERSION" \
            --body "Auto-generated by dolthub/dolt's cd-update-cli-docs workflow on publish of Dolt v$VERSION."
