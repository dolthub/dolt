name: Test Go (Adaptive Encoding)

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'go/**'
      - '.github/workflows/ci-go-tests-adaptive.yaml'
  workflow_dispatch:

concurrency:
  group: ci-go-tests-adaptive-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go tests (adaptive encoding)
    defaults:
      run:
        shell: bash
    runs-on: ubuntu-22.04
    env:
      DOLT_USE_ADAPTIVE_ENCODING: "true"
    steps:
    - uses: actions/checkout@v6
    - name: Set up Go 1.x
      uses: actions/setup-go@v5
      with:
        go-version-file: go/go.mod
      id: go
    - name: Generate coverage package list
      working-directory: ./go/cmd/dolt
      run: |
        go list -f '{{if not .Standard}}{{.ImportPath}}{{end}}' -deps . | grep dolthub | paste -sd"," - > "$GITHUB_WORKSPACE/pkgs.txt"
    - name: Create coverage directory
      run: |
        mkdir -p /tmp/coverdata/unit-adaptive
        echo "GOCOVERDIR=/tmp/coverdata/unit-adaptive" >> $GITHUB_ENV
    - name: Test All
      working-directory: ./go
      run: |
        COV_PKGS=$(cat "$GITHUB_WORKSPACE/pkgs.txt")
        files=$(go list ./...)
        SAVEIFS=$IFS
        IFS=$'\n'
        file_arr=($files)
        IFS=$SAVEIFS

        for (( i=0; i<${#file_arr[@]}; i++ ))
        do
          # Skip binlog tests as they run in a separate CI job
          if [[ "${file_arr[$i]}" == *binlogreplication* ]]; then
            echo "Skipping binlog package: ${file_arr[$i]} (runs in separate CI)"
            continue
          fi

          echo "Testing Package: ${file_arr[$i]}"
          if [[ "${file_arr[$i]}" != *enginetest* ]]; then
            go test -cover -coverpkg="$COV_PKGS" -vet=off -timeout 45m -race "${file_arr[$i]}" -args -test.gocoverdir=/tmp/coverdata/unit-adaptive
          else
            echo "skipping enginetests for -race"
          fi
          succeeded=$(echo "$?")
          if [ "$succeeded" -ne 0 ]; then
            echo "Testing failed in package ${file_arr[$i]}"
            exit 1;
          fi
        done
    - name: Upload coverage data
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-go-tests-adaptive
        path: /tmp/coverdata
        retention-days: 5
  noracetest:
    name: Go tests - no race (adaptive encoding)
    defaults:
      run:
        shell: bash
    runs-on: ubuntu-22.04
    env:
      DOLT_USE_ADAPTIVE_ENCODING: "true"
    steps:
    - uses: actions/checkout@v6
    - name: Set up Go 1.x
      uses: actions/setup-go@v5
      with:
        go-version-file: go/go.mod
      id: go
    - name: Generate coverage package list
      working-directory: ./go/cmd/dolt
      run: |
        go list -f '{{if not .Standard}}{{.ImportPath}}{{end}}' -deps . | grep dolthub | paste -sd"," - > "$GITHUB_WORKSPACE/pkgs.txt"
    - name: Create coverage directory
      run: |
        mkdir -p /tmp/coverdata/unit-adaptive-norace
        echo "GOCOVERDIR=/tmp/coverdata/unit-adaptive-norace" >> $GITHUB_ENV
    - name: Test All
      working-directory: ./go
      run: |
        COV_PKGS=$(cat "$GITHUB_WORKSPACE/pkgs.txt")
        go test -cover -coverpkg="$COV_PKGS" -vet=off -timeout 30m ./libraries/doltcore/sqle/integration_test -args -test.gocoverdir=/tmp/coverdata/unit-adaptive-norace
      env:
        DOLT_TEST_RUN_NON_RACE_TESTS: "true"
    - name: Upload coverage data
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-go-tests-adaptive-norace
        path: /tmp/coverdata
        retention-days: 5
